# Pointing (central receives pointer data from peripheral)
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# BLE connection interval (7.5ms — minimum latency)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# Display — diagnostic: SSD1306 driver only, no LVGL/ZMK display
# CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
CONFIG_I2C=y
CONFIG_I2C_GPIO=y
