# Pointing / trackpad
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_INPUT_TPS43=y

# Stack sizes (I2C polling needs headroom)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096

# BLE connection interval (7.5ms — minimum latency)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
